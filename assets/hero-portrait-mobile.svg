<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Portret editorial premium al mentorului pentru mobil</title>
  <desc id="desc">Variantă locală mobile a ilustrației de brand pentru zona hero.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#130b0d" />
      <stop offset="0.48" stop-color="#2a070c" />
      <stop offset="1" stop-color="#0d0d0d" />
    </linearGradient>
    <radialGradient id="halo" cx="52%" cy="18%" r="64%">
      <stop offset="0" stop-color="#ddc8b3" stop-opacity="0.65" />
      <stop offset="0.3" stop-color="#b76e79" stop-opacity="0.24" />
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="38%" r="47%">
      <stop offset="0" stop-color="#f3d8c7" />
      <stop offset="0.74" stop-color="#b98578" />
      <stop offset="1" stop-color="#5f2c2c" />
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13090b" />
      <stop offset="0.56" stop-color="#4d1118" />
      <stop offset="1" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b6b46" stop-opacity="0" />
      <stop offset="0.5" stop-color="#f0d3a8" stop-opacity="0.72" />
      <stop offset="1" stop-color="#8b6b46" stop-opacity="0" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45" />
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="720" height="900" fill="url(#bg)" />
  <rect width="720" height="900" fill="url(#halo)" />
  <circle cx="518" cy="144" r="245" fill="#ddc8b3" opacity="0.1" filter="url(#soft)" />
  <circle cx="144" cy="612" r="302" fill="#7a1d2a" opacity="0.22" filter="url(#soft)" />
  <g opacity="0.42" fill="none" stroke="url(#gold)" stroke-width="2">
    <path d="M65 162C238 72 482 72 655 162" />
    <path d="M86 747C259 648 468 648 634 747" />
  </g>
  <g filter="url(#shadow)">
    <path d="M130 864C173 648 245 540 360 540C482 540 554 648 605 864Z" fill="url(#dress)" />
    <path d="M245 585C281 693 439 693 475 585C425 630 302 630 245 585Z" fill="#d7b79b" opacity="0.78" />
    <path d="M216 252C216 126 295 63 382 72C490 90 540 225 504 378C461 549 266 558 223 387C202 324 202 279 216 252Z" fill="#180d0f" />
    <ellipse cx="367" cy="306" rx="115" ry="171" fill="url(#skin)" />
    <path d="M259 261C310 144 432 126 490 270C418 189 324 198 259 261Z" fill="#241113" opacity="0.82" />
    <path d="M302 369C346 414 403 414 439 369" stroke="#5f2c2c" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.45" />
  </g>
  <rect x="43" y="41" width="634" height="819" rx="40" fill="none" stroke="#ddc8b3" stroke-opacity="0.18" stroke-width="2" />
  <rect width="720" height="900" filter="url(#grain)" opacity="0.62" />
</svg>
